<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game_Docker</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <header>
        <h1>
            Game Docker
        </h1>
    </header>
    <main>

        <div class="display">

            <div>
                <button id="btn-winner" class="btn-round btn hidden"></button>
                <button id="btn-round" class="btn-round btn hidden"></button>
            </div>
            
            <div>
                <button id="btn-start" class="btn-start btn btn-game">
                    Start
                </button>
                <button id="btn-reset" class="btn btn-reset btn-game hidden">
                    Reset
                </button>
            </div>
            

        </div>
        
    </main>
    <script src="script.js" defer></script>
</body>
</html>
